<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colmar Academy - Version 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="m-0 font-sans text-gray-800">
    <!-- Header Desktop -->
    <header class="bg-white">
      <div class="mx-auto hidden h-16 max-w-screen-xl items-center justify-between px-6 md:flex">
        <a href="#" class="flex items-center gap-2" aria-label="Colmar Academy home">
          <img src="./assets/images/ic-logo.svg" alt="Colmar Academy logo" class="h-10 w-10" />
          <span class="text-lg tracking-wide text-gray-500">
            <strong class="font-bold text-gray-900">COLMAR</strong>ACADEMY
          </span>
        </a>

        <nav class="flex gap-4 text-sm">
          <a href="#">On campus</a>
          <a href="#">Online</a>
          <a href="#">For companies</a>
          <a href="#">Sign in</a>
        </nav>
      </div>

      <!-- Header Mobile -->
      <nav class="mx-auto flex h-16 max-w-screen-xl items-center justify-around px-4 md:hidden" aria-label="Mobile navigation">
        <a href="#" aria-label="Home">
          <img src="./assets/images/ic-logo.svg" alt="" class="h-8 w-8" />
        </a>
        <a href="#" aria-label="On campus">
          <img src="./assets/images/ic-on-campus.svg" alt="" class="h-8 w-8" />
        </a>
        <a href="#" aria-label="Online">
          <img src="./assets/images/ic-online.svg" alt="" class="h-8 w-8" />
        </a>
        <a href="#" aria-label="Sign in">
          <img src="./assets/images/ic-login.svg" alt="" class="h-8 w-8" />
        </a>
      </nav>
    </header>

    <main>
      <!-- Hero -->
      <section class="bg-gray-300">
        <div class="mx-auto flex max-w-screen-xl flex-col md:flex-row">
          <div class="md:w-3/5 md:p-8">
            <img
              src="./assets/images/banner.jpg"
              alt="Students studying at a table outdoors"
              class="w-full"
            />
          </div>

          <div class="flex flex-col justify-center px-4 py-8 md:w-2/5 md:px-6">
            <h1 class="mb-8 text-4xl font-bold leading-tight md:text-5xl">
              Learn something new everyday
            </h1>
            <p class="mb-6 text-lg font-medium">
              Lorem ipsum dolor sit amet, consectetur adipiscing elit.
            </p>
            <a href="#" class="inline-block bg-gray-800 px-8 py-4 text-center text-white">
              Start here
            </a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
